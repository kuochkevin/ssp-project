#!/bin/sh
# Runs all test cases before every commit.

echo "Running test suite before commit..."

pytest task1/test_extractor.py task2/test_comparator.py task3/test_executor.py -v

if [ $? -ne 0 ]; then
  echo ""
  echo "Tests failed. Commit aborted."
  echo "Fix the failing tests and try again."
  exit 1
fi

echo "All tests passed. Proceeding with commit."
exit 0
